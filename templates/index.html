<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Sistema de Cadastro</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background-color: #04464b;
}

.navbar {
    background-color: #011217;
}

.card-custom {
    border-radius: 15px;
}
</style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark px-4">
    <span class="navbar-brand mb-0 h1">💻 Sistema de Cadastro - SIMONE</span>
</nav>

<!-- ALERTA -->
<div class="container mt-3">

{% with messages = get_flashed_messages() %}
  {% if messages %}
    <div class="alert alert-success alert-dismissible fade show text-center shadow rounded-3" role="alert">
      <strong>Sucesso!</strong> {{ messages[0] }}
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
  {% endif %}
{% endwith %}

</div>

<!-- CONTEÚDO -->
<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-md-6">

<div class="card card-custom shadow-sm p-4">

<h4 class="mb-4 text-center">Cadastrar Usuário</h4>

<form action="/cadastrar" method="POST">

<div class="mb-3">
<label>Nome</label>
<input type="text" class="form-control" name="nome" placeholder="Digite seu nome" required>
</div>

<div class="mb-3">
<label>Idade</label>
<input type="number" class="form-control" name="idade" required>
</div>

<div class="mb-3">
<label>Email</label>
<input type="email" class="form-control" name="email" required>
</div>

<button class="btn btn-primary w-100">Cadastrar</button>

</form>

</div>

</div>

</div>

</div>

<!-- JS Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
