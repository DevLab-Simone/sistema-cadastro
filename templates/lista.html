<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Usuários</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #667eea, #764ba2);
}

.navbar {
    background-color: #4f46e5;
}

.full-height {
    height: calc(100vh - 56px);
}

.card {
    border-radius: 15px;
}

/* Cabeçalho da tabela */
thead {
    background-color: #4f46e5;
    color: white;
}

/* Linhas com efeito hover */
tbody tr:hover {
    background-color: #eef2ff;
    transition: 0.3s;
}

/* Destaque no nome */
.nome {
    font-weight: bold;
    color: #4f46e5;
}

/* Email mais suave */
.email {
    color: #6b7280;
}
</style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark px-4">
    <span class="navbar-brand mb-0 h1">📋 Usuários Cadastrados</span>
</nav>

<!-- CENTRALIZADO -->
<div class="container full-height d-flex justify-content-center align-items-center">

<div class="card shadow-lg p-4" style="width: 100%; max-width: 850px;">

<h4 class="text-center mb-4 text-primary">Lista de Usuários</h4>

<table class="table align-middle text-center">

<thead>
<tr>
<th>Nome</th>
<th>Idade</th>
<th>Email</th>
</tr>
</thead>

<tbody>
{% for u in usuarios %}
<tr>
<td class="nome">{{ u.nome }}</td>
<td>{{ u.idade }}</td>
<td class="email">{{ u.email }}</td>
</tr>
{% endfor %}
</tbody>

</table>

<div class="text-end mt-3">
<a href="/" class="btn btn-light px-4">← Voltar</a>
</div>

</div>

</div>

</body>
</html>
